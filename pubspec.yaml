name: kuwot
description: "A random quote generator app"
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.3.1 <4.0.0'

dependencies:
  auto_route: ^9.1.0
  bloc_concurrency: ^0.2.5
  cached_network_image: ^3.4.1
  encrypt: ^5.0.3
  envied: ^0.5.4+1
  equatable: ^2.0.5
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.5
  flutter_launcher_icons: ^0.13.1
  flutter_svg: ^2.0.10+1
  font_awesome_flutter: ^10.7.0
  fpdart: ^1.1.0
  freezed_annotation: ^2.4.4
  get_it: ^7.7.0
  google_fonts: ^6.2.1
  http: ^1.2.1
  in_app_update: ^4.2.3
  json_annotation: ^4.9.0
  package_info_plus: ^8.0.2
  pointycastle: ^3.9.1
  screenshot: ^3.0.0
  sentry_flutter: ^8.9.0
  share_plus: ^10.0.1
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.0
  uuid: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  mockito: ^5.4.4
  auto_route_generator: ^9.0.0
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  envied_generator: ^0.5.4+1

flutter:
  uses-material-design: true

  assets:
    - assets/svgs/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: 'assets/pngs/chat-quote.png'
  adaptive_icon_foreground: 'assets/pngs/chat-quote.png'
  adaptive_icon_background: '#ffffff'
  web:
    generate: true
    image_path: 'assets/pngs/web-icon.png'
    background_color: '#ffffff'
    theme_color: '#ffffff'
